<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Molecule Logic Game</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: transparent; font-family: 'Futura', sans-serif; }
        canvas { display: block; cursor: crosshair; }
        #instructions {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #333;
            font-size: 14px;
            letter-spacing: 1px;
            pointer-events: none;
            text-transform: uppercase;
            opacity: 0.6;
            text-align: center;
            width: 100%;
            transition: opacity 0.5s;
        }
    </style>
</head>
<body>
    <div id="instructions">Click the black node to start,<br>try to turn all nodes into red</div>
    <div id="canvas-container"></div>
    <script>
        // Game Constants
        const NODE_COLOR_OFF = 0x000000;
        const NODE_COLOR_ON = 0xff0000;
        const EDGE_COLOR = 0x333333;
        const NODE_RADIUS = 0.4;
        const EDGE_WIDTH = 1;

        let scene, camera, renderer, moleculeGroup;
        let nodes = [];
        let edges = [];
        let adjacencyList = {};
        let raycaster = new THREE.Raycaster();
        let mouse = new THREE.Vector2();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 25;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            moleculeGroup = new THREE.Group();
            moleculeGroup.rotation.x = Math.PI / 6;
            moleculeGroup.rotation.y = Math.PI / 6;
            scene.add(moleculeGroup);

            createMolecule();

            window.addEventListener('resize', onWindowResize, false);
            window.addEventListener('click', onClick, false);
            window.addEventListener('mousemove', onMouseMove, false);

            animate();
        }

        function createMolecule() {
            const gridSize = 4;
            
            // Hardcoded positions to create a truly 3D orthogonal structure (not all in one plane)
            const positions = [
                new THREE.Vector3(0, 0, 0),                    // 0: Center
                new THREE.Vector3(0, gridSize, 0),             // 1: Top (Y-axis)
                new THREE.Vector3(gridSize, gridSize, 0),      // 2: Top Right (X-axis from 1)
                new THREE.Vector3(0, gridSize, gridSize),      // 3: Top Front (Z-axis from 1) -> 90 deg to 2
                new THREE.Vector3(gridSize, 0, 0),             // 4: Right (X-axis)
                new THREE.Vector3(gridSize, -gridSize, 0),     // 5: Bottom Right (Y-axis from 4)
                new THREE.Vector3(0, -gridSize, 0),            // 6: Bottom (Y-axis)
                new THREE.Vector3(-gridSize, 0, 0),            // 7: Left (X-axis)
                new THREE.Vector3(-gridSize, 0, gridSize),     // 8: Left Front (Z-axis from 7) -> 90 deg to 7
                new THREE.Vector3(-gridSize, -gridSize, gridSize) // 9: Left Front Bottom (Y-axis from 8)
            ];

            positions.forEach((pos, i) => {
                const nodeGeom = new THREE.SphereGeometry(NODE_RADIUS, 16, 16);
                const nodeMat = new THREE.MeshBasicMaterial({ color: NODE_COLOR_OFF });
                const node = new THREE.Mesh(nodeGeom, nodeMat);
                node.position.copy(pos);
                node.userData = { id: i, state: false };
                moleculeGroup.add(node);
                nodes.push(node);
                adjacencyList[i] = [];
            });

            // Hardcoded edges for a consistent, solvable tree structure
            const staticEdges = [
                [0, 1], [1, 2], [1, 3], // Top branch
                [0, 4], [4, 5],         // Right branch
                [0, 6],                 // Bottom branch
                [0, 7], [7, 8], [7, 9]  // Left branch
            ];

            staticEdges.forEach(pair => addEdge(pair[0], pair[1]));
        }

        const EDGE_THICKNESS = 0.15;

        function addEdge(i, j) {
            const start = nodes[i].position;
            const end = nodes[j].position;
            const distance = start.distanceTo(end);
            
            const edgeGeom = new THREE.CylinderGeometry(EDGE_THICKNESS, EDGE_THICKNESS, distance, 8);
            const edgeMat = new THREE.MeshBasicMaterial({ color: EDGE_COLOR, transparent: true, opacity: 0.4 });
            const cylinder = new THREE.Mesh(edgeGeom, edgeMat);
            
            // Position and orient the cylinder
            const position = end.clone().add(start).divideScalar(2);
            cylinder.position.copy(position);
            cylinder.lookAt(end);
            cylinder.rotateX(Math.PI / 2);
            
            moleculeGroup.add(cylinder);
            edges.push({ mesh: cylinder, u: i, v: j });
            adjacencyList[i].push(j);
            adjacencyList[j].push(i);
        }

        function toggleNode(index) {
            const node = nodes[index];
            node.userData.state = !node.userData.state;
            node.material.color.set(node.userData.state ? NODE_COLOR_ON : NODE_COLOR_OFF);
            
            adjacencyList[index].forEach(neighborIdx => {
                const neighbor = nodes[neighborIdx];
                neighbor.userData.state = !neighbor.userData.state;
                neighbor.material.color.set(neighbor.userData.state ? NODE_COLOR_ON : NODE_COLOR_OFF);
            });

            checkWin();
        }

        let gameWon = false;
        let hasInteracted = false;

        function checkWin() {
            const win = nodes.every(n => n.userData.state === true);
            gameWon = win;
            if (win) {
                edges.forEach(e => {
                    e.mesh.material.color.set(0xffd700); // Gold
                    e.mesh.material.opacity = 1.0;
                });
                nodes.forEach(n => {
                    n.scale.set(1.5, 1.5, 1.5);
                });
            } else {
                edges.forEach(e => {
                    e.mesh.material.color.set(EDGE_COLOR);
                    e.mesh.material.opacity = 0.4;
                });
                nodes.forEach(n => n.scale.set(1, 1, 1));
            }
        }

        let isDragging = false;
        let previousMousePosition = { x: 0, y: 0 };
        let hasMoved = false;
        let lastInteractionTime = Date.now();
        const IDLE_HINT_THRESHOLD = 5000; // 5 seconds
        let hintNode = null;

        function resetIdleTimer() {
            lastInteractionTime = Date.now();
            hasInteracted = true;
            if (hintNode) {
                hintNode.scale.set(1, 1, 1);
                // Reset color to its proper state
                hintNode.material.color.set(hintNode.userData.state ? NODE_COLOR_ON : NODE_COLOR_OFF);
                hintNode = null;
            }
        }

        function onMouseDown(event) {
            isDragging = true;
            hasMoved = false;
            previousMousePosition = { x: event.clientX, y: event.clientY };
            resetIdleTimer();
        }

        function onMouseMove(event) {
            resetIdleTimer();
            // Forward mouse position to parent for foggy effect
            window.parent.postMessage({
                type: 'hero-mouse-move',
                clientX: event.clientX,
                clientY: event.clientY,
                iframeId: 'molecule-game'
            }, '*');

            if (isDragging) {
                const deltaMove = {
                    x: event.clientX - previousMousePosition.x,
                    y: event.clientY - previousMousePosition.y
                };

                if (Math.abs(deltaMove.x) > 2 || Math.abs(deltaMove.y) > 2) {
                    hasMoved = true;
                }

                moleculeGroup.rotation.y += deltaMove.x * 0.01;
                moleculeGroup.rotation.x += deltaMove.y * 0.01;

                previousMousePosition = { x: event.clientX, y: event.clientY };
            }
        }

        function onMouseUp(event) {
            isDragging = false;
        }

        function onClick(event) {
            resetIdleTimer();
            // Only toggle node if we didn't drag the model
            if (hasMoved) return;

            // Hide instructions on first click
            const instr = document.getElementById('instructions');
            if (instr) instr.style.opacity = '0';

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(nodes);

            if (intersects.length > 0) {
                const clickedNode = intersects[0].object;
                toggleNode(clickedNode.userData.id);
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            // Idle Hint Logic - Only if not won
            const now = Date.now();
            if (!gameWon && now - lastInteractionTime > IDLE_HINT_THRESHOLD && nodes.length > 0) {
                if (!hintNode) hintNode = nodes[1]; // Correct node to start with (Top node)
                const t = (Math.sin(now * 0.005) + 1) / 2; // 0 to 1
                const pulse = 1 + (t - 0.5) * 0.4;
                hintNode.scale.set(pulse, pulse, pulse);
                
                // Gradually transition color between black and red
                const colorA = new THREE.Color(NODE_COLOR_OFF);
                const colorB = new THREE.Color(NODE_COLOR_ON);
                hintNode.material.color.lerpColors(colorA, colorB, t);
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('mousedown', onMouseDown);
        window.addEventListener('mousemove', onMouseMove);
        window.addEventListener('mouseup', onMouseUp);
        window.addEventListener('click', onClick);
        window.addEventListener('resize', onWindowResize);

        init();
    </script>
</body>
</html>
